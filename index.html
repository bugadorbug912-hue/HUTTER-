        /* TELA DE BLOQUEIO */
        #lock { position: fixed; inset: 0; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100000; }
        .lock-icon { font-size: 60px; color: var(--ios-blue); margin-bottom: 10px; }
        #error-msg { color: var(--danger); font-size: 15px; font-weight: bold; margin-bottom: 15px; height: 20px; }

        /* MODAL NOVA PASTA */
        #modal-pasta { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 95000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; }

        #sidebar.open { left: 0; }

        .menu-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f9f9f9; color: #333; text-decoration: none; font-weight: 600; cursor: pointer; }

        #add-btn { position: fixed; bottom: 35px; right: 25px; width: 68px; height: 68px; background: var(--ios-blue); color: #fff; border-radius: 50%; border: none; font-size: 38px; box-shadow: 0 8px 22px rgba(0,122,255,0.4); z-index: 80000; }
    </style>
</head>

    </div>
</div>

        <div style="display:flex; gap:10px;">
            <button class="btn-m" style="background:#ccc" onclick="fecharModal()">Sair</button>
            <button class="btn-m" onclick="confirmarCriarPasta()">Criar</button>
        </div>
    </div>
</div>

        <div style="margin-top:10px; font-weight:800;">Alberto José</div>
    </div>

    <button id="back-icon" class="nav-icon" style="display:none;" onclick="voltar()">❮</button>
    <span id="title">Meus Álbuns</span>
</header>

<div id="grid"></div>

<button id="del-btn" class="del-btn" onclick="eliminarSelecionados()">🗑️</button>
<button id="add-btn" onclick="botaoAcao()">+</button>

<script>
    let albumAtivo = null;
    let selecionados = [];
    let touchTimer;

    function toggleMenu() {
        const s = document.getElementById("sidebar");
        const o = document.getElementById("overlay");
        s.classList.toggle("open");
        o.style.display = s.classList.contains("open") ? "block" : "none";
    }

    function verificar() {
        const input = document.getElementById("pass-input");
        if(input.value === "1234") { document.getElementById("lock").style.display = "none"; render(); }
        else { document.getElementById("error-msg").innerText = "Código incorreto"; input.value = ""; setTimeout(()=> document.getElementById("error-msg").innerText="", 2000); }
    }

    function render() {
        const grid = document.getElementById("grid");
        const backIcon = document.getElementById("back-icon");
        const menuIcon = document.getElementById("menu-icon");
        const delBtn = document.getElementById("del-btn");
        grid.innerHTML = ""; selecionados = []; delBtn.style.display = "none";
        
        let dados = JSON.parse(localStorage.getItem("albuns_db") || "[]");

        if (albumAtivo) {
            menuIcon.style.display = "none"; backIcon.style.display = "block";
            document.getElementById("title").innerText = albumAtivo;
            let p = dados.find(x => x.nome === albumAtivo);
            if(p) p.fotos.forEach((f, index) => {
                let div = document.createElement("div"); div.className = "photo-card-wrap";
                div.innerHTML = `<img src="${f}">`;
                div.onclick = () => { if(selecionados.length > 0) toggleSelect(index, div); else abrirFoto(f); };
                div.onmousedown = () => touchTimer = setTimeout(() => toggleSelect(index, div), 500);
                div.onmouseup = () => clearTimeout(touchTimer);
                grid.appendChild(div);
            });
        } else {
            menuIcon.style.display = "block"; backIcon.style.display = "none";
            document.getElementById("title").innerText = "Meus Álbuns";
            dados.forEach((a, index) => {
                let d = document.createElement("div"); d.className = "folder";
                d.innerHTML = `<span style="font-size:40px;display:block">📁</span><b>${a.nome}</b>`;
                d.onclick = () => { if(selecionados.length > 0) toggleSelect(index, d); else { albumAtivo = a.nome; render(); } };
                d.onmousedown = () => touchTimer = setTimeout(() => toggleSelect(index, d), 500);
                d.onmouseup = () => clearTimeout(touchTimer);
                grid.appendChild(d);
            });
        }
    }

    function toggleSelect(id, el) {
        if(selecionados.includes(id)) {
            selecionados = selecionados.filter(i => i !== id);
            el.classList.remove("selected");
        } else {
            selecionados.push(id);
            el.classList.add("selected");
        }
        document.getElementById("del-btn").style.display = selecionados.length > 0 ? "block" : "none";
    }

    function abrirFoto(src) {
        document.getElementById("view-img").src = src;
        document.getElementById("viewer").style.display = "flex";
    }

    function eliminarSelecionados() {
        let dados = JSON.parse(localStorage.getItem("albuns_db") || "[]");
        if(albumAtivo) {
            let p = dados.find(x => x.nome === albumAtivo);
            p.fotos = p.fotos.filter((_, i) => !selecionados.includes(i));
        } else {
            dados = dados.filter((_, i) => !selecionados.includes(i));
        }
        localStorage.setItem("albuns_db", JSON.stringify(dados));
        render();
    }

    function botaoAcao() {
        if(albumAtivo) {
            let i = document.createElement("input"); i.type="file"; i.accept="image/*"; i.multiple=true;
            i.onchange = e => {
                let l = JSON.parse(localStorage.getItem("albuns_db") || "[]");
                let p = l.find(x => x.nome === albumAtivo);
                Array.from(e.target.files).forEach(f => {
                    let r = new FileReader();
                    r.onload = ev => { p.fotos.push(ev.target.result); localStorage.setItem("albuns_db", JSON.stringify(l)); render(); };
                    r.readAsDataURL(f);
                });
            }; i.click();
        } else { document.getElementById("modal-pasta").style.display = "flex"; }
    }

    function fecharModal() { document.getElementById("modal-pasta").style.display = "none"; }
    function confirmarCriarPasta() {
        let n = document.getElementById("nome-pasta-input").value;
        if(n) {
            let l = JSON.parse(localStorage.getItem("albuns_db") || "[]");
            l.push({nome: n, fotos: []});
            localStorage.setItem("albuns_db", JSON.stringify(l));
            fecharModal(); render();
        }
    }
    function voltar() { albumAtivo = null; render(); }
    function abrirEspecial(n) { albumAtivo = n; render(); }
</script>
</body>
