<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Galeria Pro</title>
    
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; --danger: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--ios-bg); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* TELA DE BLOQUEIO */
        #lock { position: fixed; inset: 0; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100000; }
        .lock-icon { font-size: 60px; color: var(--ios-blue); margin-bottom: 10px; }
        #error-msg { color: var(--danger); font-size: 15px; font-weight: bold; margin-bottom: 15px; height: 20px; }
        #lock input { padding: 18px; border-radius: 16px; background: #1c1c1e; color: #fff; border: 1px solid #333; font-size: 28px; text-align: center; width: 250px; margin-bottom: 30px; letter-spacing: 8px; }
        .btn-entrar { background: var(--ios-blue); color: #fff; border: none; padding: 16px 80px; border-radius: 40px; font-weight: 800; cursor: pointer; }

        /* MODAL NOVA PASTA */
        #modal-pasta { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 95000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; }
        .modal-box input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin: 20px 0; font-size: 16px; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-m { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; }

        /* MENU LATERAL */
        #sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #fff; z-index: 90000; transition: 0.3s ease; display: flex; flex-direction: column; }
        #sidebar.open { left: 0; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 85000; }
        .menu-header { padding: 60px 20px 30px; text-align: center; border-bottom: 1px solid #eee; }
        .menu-photo { width: 95px; height: 95px; border-radius: 50%; object-fit: cover; border: 3px solid var(--ios-blue); margin-bottom: 10px; }
        .menu-item { padding: 16px 25px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #f9f9f9; color: #333; text-decoration: none; font-weight: 600; cursor: pointer; }

        /* HEADER */
        header { padding: 55px 20px 15px; background: #fff; display: flex; align-items: center; border-bottom: 1px solid #ddd; }
        .nav-icon { font-size: 28px; color: var(--ios-blue); background: none; border: none; width: 45px; text-align: left; font-weight: bold; }
        #title { font-size: 19px; font-weight: 800; flex: 1; text-align: center; margin-right: 45px; }

        /* GRID */
        #grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; overflow-y: auto; flex: 1; }
        .folder { background: #fff; border-radius: 20px; padding: 25px 15px; text-align: center; border: 1px solid #efeff4; }
        .folder-icon { font-size: 50px; color: #ffcc00; margin-bottom: 10px; display: block; }
        .photo-card { width: 100%; aspect-ratio: 1; border-radius: 12px; object-fit: cover; }
        
        #add-btn { position: fixed; bottom: 35px; right: 25px; width: 68px; height: 68px; background: var(--ios-blue); color: #fff; border-radius: 50%; border: none; font-size: 38px; box-shadow: 0 8px 22px rgba(0,122,255,0.4); z-index: 80000; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="modal-pasta">
    <div class="modal-box">
        <h3 style="color:#000">Nova Pasta</h3>
        <input type="text" id="nome-pasta-input" placeholder="Nome da pasta">
        <div class="modal-btns">
            <button class="btn-m" style="background:#eee;" onclick="fecharModal()">Sair</button>
            <button class="btn-m" style="background:var(--ios-blue); color:#fff;" onclick="confirmarCriarPasta()">Criar</button>
        </div>
    </div>
</div>

<nav id="sidebar">
    <div class="menu-header">
        <img src="1000682496.jpg" class="menu-photo" onerror="this.src='https://via.placeholder.com/95?text=AJ'">
        <div style="font-weight: 800; font-size: 19px;">Alberto José</div>
    </div>
    <div class="menu-item" onclick="voltar(); toggleMenu()">🖼️ Meus Álbuns</div>
    <div class="menu-item" onclick="abrirEspecial('Lixeira'); toggleMenu()">🗑️ Lixeira</div>
    <div class="menu-item" onclick="abrirEspecial('Favoritos'); toggleMenu()">⭐ Favoritos</div>
    <div style="margin-top: auto; border-top: 1px solid #eee;">
        <a href="https://instagram.com/alberto_jose22a" class="menu-item">📸 Instagram</a>
        <a href="https://www.facebook.com/profile.php?id=100046460659895" class="menu-item">👤 Facebook</a>
    </div>
</nav>

<div id="lock">
    <div class="lock-icon">🔒</div>
    <div id="error-msg"></div>
    <input id="pass-input" type="password" placeholder="••••" inputmode="numeric">
    <button class="btn-entrar" onclick="verificar()">ENTRAR</button>
</div>

<header>
    <button id="menu-icon" class="nav-icon" onclick="toggleMenu()">☰</button>
    <button id="back-icon" class="nav-icon" style="display:none;" onclick="voltar()">❮</button>
    <span id="title">Meus Álbuns</span>
</header>

<div id="grid"></div>
<button id="add-btn" onclick="botaoAcao()">+</button>

<script>
    let albumAtivo = null;

    function toggleMenu() {
        const s = document.getElementById("sidebar");
        const o = document.getElementById("overlay");
        s.classList.toggle("open");
        o.style.display = s.classList.contains("open") ? "block" : "none";
    }

    function verificar() {
        const input = document.getElementById("pass-input");
        const msg = document.getElementById("error-msg");
        if(input.value === "1234") { document.getElementById("lock").style.display = "none"; render(); }
        else { msg.innerText = "Código incorreto"; input.value = ""; setTimeout(() => { msg.innerText = ""; }, 2500); }
    }

    function render() {
        const grid = document.getElementById("grid");
        const title = document.getElementById("title");
        const menuIcon = document.getElementById("menu-icon");
        const backIcon = document.getElementById("back-icon");
        grid.innerHTML = "";
        let dados = JSON.parse(localStorage.getItem("albuns_db") || "[]");

        if (albumAtivo) {
            menuIcon.style.display = "none"; backIcon.style.display = "block";
            title.innerText = albumAtivo;
            let p = dados.find(x => x.nome === albumAtivo);
            if(p) p.fotos.forEach(f => {
                let img = document.createElement("img"); img.src = f; img.className = "photo-card";
                grid.appendChild(img);
            });
        } else {
            menuIcon.style.display = "block"; backIcon.style.display = "none";
            title.innerText = "Meus Álbuns";
            dados.forEach(a => {
                let d = document.createElement("div"); d.className = "folder";
                d.innerHTML = `<span class="folder-icon">📁</span><b>${a.nome}</b>`;
                d.onclick = () => { albumAtivo = a.nome; render(); };
                grid.appendChild(d);
            });
        }
    }

    function abrirEspecial(n) {
        let l = JSON.parse(localStorage.getItem("albuns_db") || "[]");
        if(!l.find(x => x.nome === n)) { l.push({nome: n, fotos: []}); localStorage.setItem("albuns_db", JSON.stringify(l)); }
        albumAtivo = n; render();
    }

    function voltar() { albumAtivo = null; render(); }
    function fecharModal() { document.getElementById("modal-pasta").style.display = "none"; document.getElementById("nome-pasta-input").value = ""; }

    function confirmarCriarPasta() {
        let n = document.getElementById("nome-pasta-input").value.trim();
        if(n) {
            let l = JSON.parse(localStorage.getItem("albuns_db") || "[]");
            l.push({nome: n, fotos: []});
            localStorage.setItem("albuns_db", JSON.stringify(l));
            fecharModal(); render();
        }
    }

    function botaoAcao() {
        if(albumAtivo) {
            let i = document.createElement("input"); i.type="file"; i.accept="image/*"; i.multiple=true;
            i.onchange = e => {
                let l = JSON.parse(localStorage.getItem("albuns_db") || "[]");
                let p = l.find(x => x.nome === albumAtivo);
                Array.from(e.target.files).forEach(f => {
                    let r = new FileReader();
                    r.onload = ev => { p.fotos.push(ev.target.result); localStorage.setItem("albuns_db", JSON.stringify(l)); render(); };
                    r.readAsDataURL(f);
                });
            }; i.click();
        } else {
            document.getElementById("modal-pasta").style.display = "flex";
        }
    }
</script>
</body>
</html>
